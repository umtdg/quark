name: 'version'
description: 'Append pre-release version identifier to Cargo.toml'

inputs:
  platform:
    required: true
    description: 'Runner platform'

outputs:
  date:
    description: 'Human-readable date for use in releases'
    value: ${{ steps.version.outputs.date }}
  build-number:
    description: 'Build number -- equivalent to $GITHUB_RUN_NUMBER'
    value: ${{ steps.version.outputs.build-number }}

runs:
  using: 'composite'
  steps:
    - name: Get current date and version
      id: version
      shell: bash
      run: |
        # gets the date for both tag and version, and in human readable form for releases
        DATE="$(date '+%Y-%m-%d')"
        VER=$(cargo metadata --frozen --no-deps --color never --format-version 1 --manifest-path src-tauri/Cargo.toml | jq -r '.packages[0].version')

        echo "date=$DATE" >> $GITHUB_OUTPUT
        echo "build-number=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

        echo "version-win=$VER.$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT
        echo "version-unix=$VER-nightly.$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

    - name: Patch version in Cargo.toml for nightly (Ubuntu)
      if: inputs.platform == 'ubuntu-22.04'
      shell: bash
      run: |
        sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version-unix }}\"/" src-tauri/Cargo.toml
        sed -i "s/\"productName\": \"[^\"]*\"/\"productName\": \"Quark Nightly\"/" src-tauri/tauri.conf.json

    - name: Patch version in Cargo.toml for nightly (MacOS)
      if: inputs.platform == 'macos-latest'
      shell: bash
      run: |
        sed -i '' "s/^version = \".*\"/version = \"${{ steps.version.outputs.version-unix }}\"/" src-tauri/Cargo.toml
        sed -i '' "s/\"productName\": \"[^\"]*\"/\"productName\": \"Quark Nightly\"/" src-tauri/tauri.conf.json

    - name: Patch version in Cargo.toml for nightly (Windows)
      if: inputs.platform == 'windows-latest'
      shell: bash
      run: |
        sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version-win }}\"/" src-tauri/Cargo.toml
        sed -i "s/\"productName\": \"[^\"]*\"/\"productName\": \"Quark Nightly\"/" src-tauri/tauri.conf.json
