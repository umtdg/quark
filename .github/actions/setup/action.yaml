name: 'setup'
description: 'Common setup for other workflows'

inputs:
  platform:
    required: true
    description: 'Runner platform'

runs:
  using: 'composite'
  steps:
    - name: install dependencies (ubuntu only)
      if: matrix.platform == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'pnpm'

    - name: install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        # Those targets are only used on macos runners so it's in an `if` to
        # slightly speed up windows and linux builds.
        targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: install frontend dependencies
      shell: bash
      # no need for `pnpm build` as `beforeBuildCommand` is configured
      run: pnpm install
