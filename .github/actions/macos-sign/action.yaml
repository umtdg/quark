name: Prepare Apple Certificate for signing
description: "Import Apple Developer Certificate and put App Store Connect API
  key to a file"

runs:
  using: composite
  steps:
    - name: Import Apple Developer Certificate
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      shell: bash
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

        echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k build.keychain \
          -P "$APPLE_CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign
        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PASSWORD" build.keychain
        security find-identity -v -p codesigning build.keychain

    - name: Verify Apple Developer Certificate
      shell: bash
      run: |
        cert_info=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
        cert_id=$(echo "$cert_info" | awk -F'"' '{print $2}')
        echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
        echo "Apple Developer Certificate imported"

    - name: Create Apple API key file
      shell: bash
      run: |
        key_id='${{ secrets.APPLE_API_KEY_ID }}'
        key_path="$RUNNER_TEMP/AuthKey_$key_id.p8"
        printf '%s' '${{ secrets.APPLE_API_KEY }}' > "$key_path"
        chmod 600 "$key_path"
        echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
        echo "Apple API key file created"
