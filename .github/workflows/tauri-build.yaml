name: "Tauri Build"

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
        description: "Target platform to build on"
      status-target:
        type: string
        required: true
        description: "Status key suffix (linux/windows/macos-aarch64)"
      args:
        type: string
        required: false
        description: "Additional arguments passed to tauri-action"
        default: ""
      nightly:
        type: boolean
        required: false
        description: "Whether this is a nightly build (runs patch-version)"
        default: false
      build-number:
        type: string
        required: false
        description: "Nightly build number (required when nightly is true)"
        default: ""
      tagName:
        type: string
        required: false
        description: "Tag name for the release (empty = build only, no release)"
        default: ""
      releaseName:
        type: string
        required: false
        description: "Release name"
        default: ""
      releaseBody:
        type: string
        required: false
        description: "Release body text"
        default: ""
      releaseDraft:
        type: boolean
        required: false
        description: "Whether to create the release as a draft"
        default: false
      generateReleaseNotes:
        type: boolean
        required: false
        description: "Whether to auto-generate release notes"
        default: false

jobs:
  build:
    permissions:
      contents: write

    runs-on: ${{ inputs.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          platform: ${{ inputs.platform }}

      - uses: ./.github/actions/patch-version
        if: inputs.nightly
        id: version
        with:
          platform: ${{ inputs.platform }}
          build-number: ${{ inputs.build-number }}

      - name: Import Apple Developer Certificate
        if: inputs.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Apple Developer Certificate
        if: inputs.platform == 'macos-latest'
        shell: bash
        run: |
          cert_info=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          cert_id=$(echo "$cert_info" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          echo "Apple Developer Certificate imported"

      - name: Create Apple API key file
        if: inputs.platform == 'macos-latest'
        shell: bash
        run: |
          key_id='${{ secrets.APPLE_API_KEY_ID }}'
          key_path="$RUNNER_TEMP/AuthKey_$key_id.p8"
          printf '%s' '${{ secrets.APPLE_API_KEY }}' > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "Apple API key file created"

        # timeout because apple notarization can take unreasonably long
        # and macos runner will eat all of the actions usage
      - uses: tauri-apps/tauri-action@v0
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ inputs.tagName }}
          releaseName: ${{ inputs.releaseName }}
          releaseBody: ${{ inputs.releaseBody }}
          releaseDraft: ${{ inputs.releaseDraft }}
          prerelease: ${{ inputs.nightly }}
          generateReleaseNotes: ${{ inputs.generateReleaseNotes }}
          args: ${{ inputs.args }}

  update-badge:
    needs: build
    if: always()

    # when build succeeds, even if updating status badges fail,
    # the whole workflow should succeed
    continue-on-error: true

    runs-on: ubuntu-latest

    steps:
      - name: Build badge metadata
        id: badge
        shell: bash
        run: |
          # Badge metadata in human readable form: <channel> <target>
          if [ '${{ inputs.nightly }}' = 'true' ]; then
            channel='nightly'
            channel_label='Nightly'
          else
            channel='release'
            channel_label='Release'
          fi

          target='${{ inputs.status-target }}'
          case "$target" in
            linux)
              target_label='Linux'
              ;;
            windows)
              target_label='Windows'
              ;;
            macos-aarch64)
              target_label='MacOS ARM'
              ;;
            *)
              echo "Unsupported target: $target" >&2
              exit 1
              ;;
          esac

          if [ '${{ needs.build.result }}' = 'success' ]; then
            message='passing'
            color='brightgreen'
          else
            message='failing'
            color='red'
          fi

          {
            echo "filename=$channel-$target.json"
            echo "label=$channel_label $target_label"
            echo "message=$message"
            echo "color=$color"
          } >> "$GITHUB_OUTPUT"

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.BADGE_GIST_TOKEN }}
          gistID: ${{ secrets.BADGE_GIST_ID }}
          filename: ${{ steps.badge.outputs.filename }}
          label: ${{ steps.badge.outputs.label }}
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
          forceUpdate: true
