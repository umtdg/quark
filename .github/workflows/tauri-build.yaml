name: "Tauri Build"

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
        description: "Target platform to build on"
      status-target:
        type: string
        required: true
        description: "Status key suffix (linux/windows/macos-aarch64)"
      args:
        type: string
        required: false
        description: "Additional arguments passed to tauri-action"
        default: ""
      nightly:
        type: boolean
        required: false
        description: "Whether this is a nightly build (runs patch-version)"
        default: false
      build-number:
        type: string
        required: false
        description: "Nightly build number (required when nightly is true)"
        default: ""
      tagName:
        type: string
        required: false
        description: "Tag name for the release (empty = build only, no release)"
        default: ""
      releaseName:
        type: string
        required: false
        description: "Release name"
        default: ""
      releaseBody:
        type: string
        required: false
        description: "Release body text"
        default: ""
      releaseDraft:
        type: boolean
        required: false
        description: "Whether to create the release as a draft"
        default: false
      generateReleaseNotes:
        type: boolean
        required: false
        description: "Whether to auto-generate release notes"
        default: false

jobs:
  build:
    permissions:
      contents: write

    runs-on: ${{ inputs.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          platform: ${{ inputs.platform }}

      - uses: ./.github/actions/patch-version
        if: inputs.nightly
        id: version
        with:
          platform: ${{ inputs.platform }}
          build-number: ${{ inputs.build-number }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tagName }}
          releaseName: ${{ inputs.releaseName }}
          releaseBody: ${{ inputs.releaseBody }}
          releaseDraft: ${{ inputs.releaseDraft }}
          prerelease: ${{ inputs.nightly }}
          generateReleaseNotes: ${{ inputs.generateReleaseNotes }}
          args: ${{ inputs.args }}

  update-badge:
    needs: build
    if: always()

    # when build succeeds, even if updating status badges fail,
    # the whole workflow should succeed
    continue-on-error: true

    runs-on: ubuntu-latest

    steps:
      - name: Build badge metadata
        id: badge
        shell: bash
        run: |
          # Badge metadata in human readable form: <channel> <target>
          if [ '${{ inputs.nightly }}' = 'true' ]; then
            channel='nightly'
            channel_label='Nightly'
          else
            channel='release'
            channel_label='Release'
          fi

          target='${{ inputs.status-target }}'
          case "$target" in
            linux)
              target_label='Linux'
              ;;
            windows)
              target_label='Windows'
              ;;
            macos-aarch64)
              target_label='MacOS ARM'
              ;;
            *)
              echo "Unsupported target: $target" >&2
              exit 1
              ;;
          esac

          if [ '${{ needs.build.result }}' = 'true' ]; then
            message='passing'
            color='brightgreen'
          else
            message='failing'
            color='red'
          fi

          {
            echo "filename=$channel-$target.json"
            echo "label=$channel_label $target_label"
            echo "message=$message"
            echo "color=$color"
          } >> "$GITHUB_OUTPUT"

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.BADGE_GIST_TOKEN }}
          gistID: ${{ secrets.BADGE_GIST_ID }}
          filename: ${{ steps.badge.outputs.filename }}
          label: ${{ steps.badge.outputs.label }}
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
          forceUpdate: true
