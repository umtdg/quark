name: 'publish'
description: 'Create a release build'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Check version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)

          MISMATCH=0
          [ "$TAURI" != "$TAG" ] && echo "tauri.conf.json: $TAURI != $TAG" && MISMATCH=1

          [ "$MISMATCH" -eq 1 ] && exit 1
          echo "All versions match the tag $TAG"

      - uses: ./.github/actions/setup
        with:
          platform: ${{ matrix.platform }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Quark v__VERSION__'
          releaseBody: 'See the assets to download this version and install'
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

