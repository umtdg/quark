name: "Nightly - MacOS ARM"

on:
  workflow_call:
    inputs:
      build-number:
        type: string
        required: true
        description: "Nightly build number"
      tag:
        type: string
        required: false
        description: "Release tag"
        default: "rolling"
      date:
        type: string
        required: true
        description: "Date for release name (YYYY-MM-DD)"

jobs:
  macos-aarch64:
    permissions:
      contents: write

    uses: ./.github/workflows/tauri-build.yaml
    secrets: inherit
    with:
      platform: macos-latest
      args: "--target aarch64-apple-darwin"
      nightly: true
      build-number: ${{ inputs.build-number }}
      tagName: ${{ inputs.tag }}
      releaseName: "Quark Nightly ${{ inputs.date }}"
      releaseBody: "Automated nightly build from main"
