name: "Release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/check-version
        with:
          version: ${{ github.ref_name }}

  release:
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            status-target: "macos-aarch64"
          - platform: "ubuntu-22.04"
            args: ""
            status-target: "linux"
          - platform: "windows-latest"
            args: ""
            status-target: "windows"

    permissions:
      contents: write

    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      gist_id: ${{ secrets.BADGE_GIST_ID }}
      gist_token: ${{ secrets.BADGE_GIST_TOKEN }}

    uses: ./.github/workflows/tauri-build.yaml
    with:
      platform: ${{ matrix.platform }}
      status-target: ${{ matrix.status-target }}
      args: ${{ matrix.args }}
      tagName: v__VERSION__
      releaseName: "Quark v__VERSION__"
      releaseBody: "See the assets to download this version and install"
      generateReleaseNotes: true
