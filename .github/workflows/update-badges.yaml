name: "Update Badges"

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
        description: "Channel to update status badges for (nightly|release)"
      enabled:
        type: boolean
        required: false
        default: true
      status:
        type: string
        required: true
      target:
        type: string
        required: true
        description: "Status key suffix (linux/windows/macos-aarch64)"
    secrets:
      gist_id:
        required: true
      gist_token:
        required: true

jobs:
  update-badges:
    if: ${{ inputs.enabled }}

    runs-on: ubuntu-latest

    steps:
      - name: Build badge metadata
        id: badge
        shell: bash
        run: |
          case '${{ inputs.channel }}' in
            nightly)
              channel_label='Nightly'
              ;;
            release)
              channel_label='Release'
              ;;
            *)
              echo 'Unsupported channel: ${{ inputs.channel }}' >&2
              exit 1
              ;;
          esac

          case '${{ inputs.target }}' in
            linux)
              target_label='Linux'
              ;;
            windows)
              target_label='Windows'
              ;;
            macos-aarch64)
              target_label='MacOS ARM'
              ;;
            *)
              echo 'Unsupported target: ${{ inputs.target }}' >&2
              exit 1
              ;;
          esac

          if [ '${{ inputs.status }}' = 'true' ]; then
            message='passing'
            color='brightgreen'
          else
            message='failing'
            color='red'
          fi

          {
            echo 'filename=${{ inputs.channel }}-${{ inputs.target }}.json'
            echo "label=$channel_label $target_label"
            echo "message=$message"
            echo "color=$color"
          } >> "$GITHUB_OUTPUT"

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.gist_token }}
          gistID: ${{ secrets.gist_id }}
          filename: ${{ steps.badge.outputs.filename }}
          label: ${{ steps.badge.outputs.label }}
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
