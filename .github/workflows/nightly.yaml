name: "Nightly"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Europe/Istanbul"

jobs:
  check-for-changes:
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/detect-changes
        id: detect-changes

  prepare:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true'

    permissions:
      contents: write

    outputs:
      build-number: ${{ steps.compute-counter.outputs.build-number }}
      date: ${{ steps.date.outputs.date }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute nightly build counter
        id: compute-counter
        shell: bash
        run: |
          CURRENT=$(cat .github/nightly-build-number)
          NEXT=$((CURRENT + 1))
          echo "build-number=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Get current date
        id: date
        shell: bash
        run: echo "date=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Delete existing rolling release and tag
        uses: actions/github-script@v9
        with:
          script: |
            const tag = 'rolling';

            // delete release if exists
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: data.id,
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // delete tag reference if exists
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (e) {
              if (e.status !== 404 && e.status !== 422) throw e;
            }

  nightly:
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            status-target: "macos-aarch64"
          - platform: "ubuntu-22.04"
            args: ""
            status-target: "linux"
          - platform: "windows-latest"
            args: ""
            status-target: "windows"

    permissions:
      contents: write

    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      gist_id: ${{ secrets.BADGE_GIST_ID }}
      gist_token: ${{ secrets.BADGE_GIST_TOKEN }}

    uses: ./.github/workflows/tauri-build.yaml
    with:
      platform: ${{ matrix.platform }}
      args: ${{ matrix.args }}
      status-target: ${{ matrix.status-target }}
      nightly: true
      build-number: ${{ needs.prepare.outputs.build-number }}
      tagName: "rolling"
      releaseName: "Quark Nightly ${{ needs.prepare.outputs.date }}"
      releaseBody: "Automated nightly build from main"

  finalize:
    needs:
      - prepare
      - nightly

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.QUARK_ACCESS_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Commit nightly build counter after successful build
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
        run: |
          git config user.name '${{ github.actor }}'
          git config user.email '${{ github.actor }}@users.noreply.github.com'

          printf '%s\n' "$BUILD_NUMBER" > .github/nightly-build-number

          # do not update if there is no diff
          if git diff --quiet -- .github/nightly-build-number; then
            exit 0
          fi

          git add .github/nightly-build-number
          git commit -m "ci: bump nightly build counter to $BUILD_NUMBER"
          git push origin "HEAD:${GITHUB_REF_NAME}"
