name: 'nightly'
description: 'Create a nightly build'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
      timezone: 'Europe/Istanbul'

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: check for changes
        id: detect-changes
        run: |
          if git log --since="24 hours ago" --oneline | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  nightly:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true'

    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          platform: ${{ matrix.platform }}

      - uses: ./.github/actions/version
        id: version
        with:
          platform: ${{ matrix.platform }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: nightly-${{ steps.version.outputs.build-number }}
          releaseName: 'Quark Nightly ${{ steps.version.outputs.date }}'
          releaseBody: 'Automated nightly build from main'
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: false
          args: ${{ matrix.args }}

