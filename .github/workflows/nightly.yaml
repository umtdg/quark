name: "nightly"
description: "Create a nightly build"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Europe/Istanbul"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for changes in files and folders that requires rebuild
        id: detect-changes
        run: |
          FILE_LIST=(src src-tauri index.html package.json pnpm-lock.json tsconfig.json vite.config.json)
          if git log --since="24 hours ago" --oneline -- "${FILE_LIST[@]}" | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  prepare:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      build-number: ${{ steps.compute-counter.outputs.build-number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Compute nightly build counter
        id: compute-counter
        shell: bash
        run: |
          CURRENT=$(cat .github/nightly-build-number)
          NEXT=$((CURRENT + 1))
          echo "build-number=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Delete existing rolling release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete rolling --cleanup-tag -y || true

  nightly:
    needs: prepare

    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        name: "Set-up environment"
        with:
          platform: ${{ matrix.platform }}

      - uses: ./.github/actions/version
        name: "Patch version and product name for nightly"
        id: version
        with:
          platform: ${{ matrix.platform }}
          build-number: ${{ needs.prepare.outputs.build-number }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: rolling
          releaseName: "Quark Nightly ${{ steps.version.outputs.date }} (Build ${{ needs.prepare.outputs.build-number }})"
          releaseBody: "Automated nightly build from main"
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: false
          args: ${{ matrix.args }}

  finalize:
    needs:
      - prepare
      - nightly
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Commit nightly build counter after successful build
        env:
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
        run: |
          COUNTER_FILE=".github/nightly-build-number"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          printf '%s\n' "$BUILD_NUMBER" > "$COUNTER_FILE"

          # do not update if there is no diff
          if git diff --quiet -- "$COUNTER_FILE"; then
            exit 0
          fi

          git add "$COUNTER_FILE"
          git commit -m "ci: bump nightly build counter to $BUILD_NUMBER"
          git push origin "HEAD:${GITHUB_REF_NAME}"
